name: Update fuel prices

on:
  schedule:
    - cron: "0 14 */2 * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update data and dashboard
        run: python update_prices.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add precios_historicos.csv index.html fuel_prices.log || true
          git diff --cached --quiet || git commit -m "Actualizar precios de combustibles"
          git push
